interface:
  display_name: "Evaluation Usage Tracker"
  short_description: "Aggregate metadata-only invocation records into usage summaries and improvement candidates"
  default_prompt: "Use $evaluation-usage-tracker to aggregate a local metadata-only invocation ledger into usage summaries, over/under-trigger candidates, no-data status, and review-gated improvement suggestions, without storing raw prompts or transcripts."

policy:
  allow_implicit_invocation: false
