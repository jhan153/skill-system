interface:
  display_name: "Workflow Rigor"
  short_description: "Mode-based evidence-first execution control"
  default_prompt: "Use $workflow-rigor to enforce evidence-first execution, split validation, and review on higher-risk changes."

policy:
  invocation_surface: support_only
  allow_implicit_invocation: false
  may_own_execution: false

work_horizon:
  level: cross_horizon
  role: quality_modifier

execution_mode:
  kind: rigor_modifier
  owns_execution: false
