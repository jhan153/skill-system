interface:
  display_name: "Design A11y Audit"
  short_description: "Collect accessibility evidence for implemented UI work."
  default_prompt: "Use $design-a11y-audit to check keyboard, focus, semantics, contrast, target size, and responsive readability evidence."
policy:
  invocation_surface: evidence_gate
  allow_implicit_invocation: false
  may_own_execution: false
  may_write: false
  may_block_completion: true
