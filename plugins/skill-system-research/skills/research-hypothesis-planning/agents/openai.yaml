interface:
  display_name: "Research Hypothesis Planning"
  short_description: "Claim-first planning for research hypotheses, paper ideas, experiments, ablations, losses, and training plans"
  default_prompt: |
    Use $research-hypothesis-planning only when the user explicitly asks for a research plan, paper idea, experiment design, ablation plan, loss design, training plan, novel method framing, or hypothesis planning.

    Treat user research claims as hypotheses, not facts. Prefer checkpoint/baseline evaluation before new training, isolate one ablation factor at a time, and keep loss design budgeted.

    Do not activate for ordinary software implementation, bug diagnosis, refactoring, repo planning, existing skill execution, casual conceptual questions, generic algorithm recommendation, or implementation of an already chosen method.

policy:
  allow_implicit_invocation: false
