adoption_decisions:
  - concept: observed-evidence-completion-gate
    decision: adapted
    upstream_reference: SRC-FABLIZE
    local_surface:
      - .codex/skills/workflow-rigor/SKILL.md
      - .codex/hooks/codex_hook_adapter.py
      - .claude/hooks/claude_hook_adapter.py
    rationale: "Observed-evidence-over-claim completion plus accepted_risk terminal. Codex enforces via the manifest-bound strict agent-output gate; the Claude adapter adds a transcript-based observed-vs-claimed strict gate (8.4.1) for parity. No upstream code."
  - concept: debugging-hypothesis-ladder
    decision: adapted
    upstream_reference: SRC-FABLECODEX
    local_surface:
      - .codex/skills/analysis-bug/SKILL.md
    rationale: "2-3 competing hypotheses and a cheapest discriminating measurement as an intermediate step; still converge to one primary root cause."
  - concept: capability-ceiling-escalation
    decision: adapted
    upstream_reference: SRC-FABLIZE
    local_surface:
      - .codex/skills/workflow-recovery/SKILL.md
    rationale: "Distinguish procedure failure from capability ceiling; escalate to higher effort/model or the user instead of adding retry/gate loops."
  - concept: harness-paradox-measurement
    decision: adapted
    upstream_reference: SRC-FABLIZE
    local_surface:
      - .codex/skills/evaluation-usage-tracker/references/harness-measurement-protocol.md
      - .codex/tools/analyze_harness_measurement.py
      - .codex/hooks/codex_hook_adapter.py
      - .claude/hooks/claude_hook_adapter.py
    rationale: "Out-of-band 80/20 holdout + sunset implemented (8.4.1): analyze_harness_measurement.py aggregates adapter-tagged turn_finalize events; the off arm is a gate-off baseline. observed-runs remain replay fixtures, not an outcome source; automated revert/reinstruction collection is a follow-up."
  - concept: checkpointed-execution-task-ledger
    decision: adapted
    upstream_reference: SRC-FABLECODEX
    local_surface:
      - .codex/skills/workflow-task-ledger/SKILL.md
      - .codex/schemas/task/task-run.schema.json
      - .codex/tools/task_ledger.py
      - .codex/tools/validate_task_run.py
    rationale: "Implemented in 8.4.1 as the workflow-task-ledger skill plus task-run schema/CLI/validator: a resume-safe step/finding ledger with observed evidence_refs and a completion gate, sitting between one-shot and a LoopRun (not a LoopRun)."
