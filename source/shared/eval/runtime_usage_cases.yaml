version: "9.0.2"
purpose: "Real-use quality observation cases for routing and output improvement."
cases:
  - case_id: runtime-001
    user_request: "이 버그가 왜 반복되는지 원인 분석해줘."
    expected_primary_skill: analysis-bug
    expected_supporting_skills: []
    should_not_trigger: [analysis-codebase, plan-long-term-package, research-router]
    expected_context: [symptom, reproduction, relevant files, logs]
    expected_output_shape: "one primary cause, evidence, fix options, validation"
    quality_notes: "Must not broaden into repo-wide reporting."
    friction_risk: "over-analysis without reproduction"
  - case_id: runtime-002
    user_request: "이 문제는 어떤 알고리즘 접근이 제일 맞아?"
    expected_primary_skill: analysis-algorithm
    expected_supporting_skills: []
    should_not_trigger: [analysis-bug, analysis-codebase]
    expected_context: [constraints, candidates, metrics]
    expected_output_shape: "candidate comparison and selected approach"
    quality_notes: "Separate recommendation from implementation."
    friction_risk: "choosing before constraints are known"
  - case_id: runtime-003
    user_request: "이 작업을 docs/plan 플랜 문서로 만들어줘."
    expected_primary_skill: plan-short-term-docs
    expected_supporting_skills: [report-critical]
    should_not_trigger: [plan-long-term-package]
    expected_context: [active request, plan template, target path]
    expected_output_shape: "persisted plan document with questions, risks, validation, TODO"
    quality_notes: "Persisted artifact intent is explicit."
    friction_risk: "creating a package when one plan is enough"
  - case_id: runtime-004
    user_request: "이 migration을 phase별 서브플랜 패키지로 만들어줘."
    expected_primary_skill: plan-long-term-package
    expected_supporting_skills: []
    should_not_trigger: [plan-short-term-docs]
    expected_context: [scope, archetype, constraints, target docs path]
    expected_output_shape: "multi-document planning package"
    quality_notes: "Heavy artifact intent is explicit."
    friction_risk: "using it for small plans"
  - case_id: runtime-005
    user_request: "Figma 화면 기준으로 이 React route를 구현해줘."
    expected_primary_skill: design-frontend
    expected_supporting_skills: [design-visual-regression, design-a11y-audit]
    should_not_trigger: [research-router, analysis-codebase]
    expected_context: [design source, repo framework, assets, validation command]
    expected_output_shape: "implemented UI with visual verification"
    quality_notes: "Design-to-frontend remains the generic implementation primary."
    friction_risk: "over-triggering analysis or explicit-only surface skills"
  - case_id: runtime-006
    user_request: "design token JSON을 플랫폼별 token으로 정리하는 스킬을 써줘."
    expected_primary_skill: design-tokens
    expected_supporting_skills: []
    should_not_trigger: [design-frontend]
    expected_context: [token source, target platform, naming rules]
    expected_output_shape: "normalized token plan or artifacts when explicitly requested"
    quality_notes: "Experimental evidence gate; keep scope narrow."
    friction_risk: "inventing tokens without source"
  - case_id: runtime-007
    user_request: "speech enhancement 최신 논문 근거를 찾아서 evidence ledger로 정리해줘."
    expected_primary_skill: search-paper-evidence
    expected_supporting_skills: [research-router]
    should_not_trigger: [research-experiment-scaffold, research-manuscript-writing]
    expected_context: [query, date range, source requirements]
    expected_output_shape: "verified sources, claim labels, missing evidence"
    quality_notes: "Do not fabricate citations."
    friction_risk: "jumping from search to experiment design"
  - case_id: runtime-008
    user_request: "이 research plan을 비판적으로 검토해줘."
    expected_primary_skill: report-critical
    expected_supporting_skills: [research-peer-review]
    should_not_trigger: [research-experiment-scaffold]
    expected_context: [plan, claims, evidence, validation]
    expected_output_shape: "major risks, evidence gaps, concrete fixes"
    quality_notes: "Critical review owns the critique."
    friction_risk: "rewriting the plan instead of reviewing"
  - case_id: runtime-009
    user_request: "프로젝트 메모리에 이 규칙을 저장해줘."
    expected_primary_skill: memory-bank-update
    expected_supporting_skills: []
    should_not_trigger: [memory-bank-maintenance, analysis-codebase]
    expected_context: [requested rule, memory file target, append-only history]
    expected_output_shape: "memory update with validation or blocked reason"
    quality_notes: "Memory mutation must be explicit."
    friction_risk: "treating temporary instruction as persistent"
  - case_id: runtime-010
    user_request: "방금 변경한 diff를 읽기 좋게 보여줘."
    expected_primary_skill: report-diff
    expected_supporting_skills: []
    should_not_trigger: [analysis-codebase]
    expected_context: [actual diff]
    expected_output_shape: "grouped changed lines with concise Korean summaries"
    quality_notes: "Only show actual changed lines."
    friction_risk: "summarizing files not in the diff"
  - case_id: runtime-011
    user_request: "스킬 maturity 기준과 improvement track을 정리해줘."
    expected_primary_skill: null
    expected_supporting_skills: []
    should_not_trigger: [coordination-brief, evaluation-harness]
    expected_context: [.codex/docs/skill_maturity.md, .codex/docs/skill_registry.md]
    expected_output_shape: "direct explanation or scoped doc update if requested"
    quality_notes: "Conceptual explanation does not need orchestration."
    friction_risk: "turning glossary work into workflow state"
  - case_id: runtime-013
    user_request: "완료된 plan은 핵심 결정만 memory 후보로 남기고 raw plan은 다음부터 active context에서 빼줘."
    expected_primary_skill: plan-spec-curator
    expected_supporting_skills: []
    should_not_trigger: [plan-short-term-docs, memory-bank-update, coordination-brief]
    expected_context: [current_goal, target_plan_slice, lifecycle_state]
    expected_output_shape: "closeout summary, memory proposal candidates, archive load policy, one next action"
    quality_notes: "Do not mutate memory directly and do not keep closed raw plans as active instructions."
    friction_risk: "turning closeout into memory mutation or a new planning package"
  - case_id: runtime-014
    user_request: "지침이 너무 길어졌어. runtime에 남길 것과 reference/archive로 뺄 것을 정리해줘."
    expected_primary_skill: plan-spec-curator
    expected_supporting_skills: []
    should_not_trigger: [analysis-codebase, plan-long-term-package, report-qualitative]
    expected_context: [current_instruction_packet, current_goal]
    expected_output_shape: "compact active context packet with excluded items and load policy"
    quality_notes: "Shrink context without treating old artifacts, field feedback, or tool output as instructions."
    friction_risk: "loading full history to solve instruction bloat"
  - case_id: runtime-015
    user_request: "이 구현 계획을 세 agent가 동시에 작업할 수 있게 lock scope와 task card로 나눠줘."
    expected_primary_skill: coordination-multi-agent
    expected_supporting_skills: [coordination-brief]
    should_not_trigger: [plan-long-term-package]
    expected_context: [active plan, file scopes, validation requirements]
    expected_output_shape: "response-first task cards with validation owners"
    quality_notes: "No persistent workflow state."
    friction_risk: "unclear file ownership"
  - case_id: runtime-016
    user_request: "runtime usage eval 5개를 돌려본 결과를 수동 capture 형식으로 정리해줘."
    expected_primary_skill: evaluation-harness
    expected_supporting_skills: []
    should_not_trigger: [report-artifact-inventory]
    expected_context: [.codex/eval cases, observed behavior]
    expected_output_shape: "manual result capture and improvement candidates"
    quality_notes: "Eval output is improvement evidence for routing and output shape."
    friction_risk: "turning eval into readiness score"
  - case_id: runtime-017
    user_request: "이전 계획과 메모리가 섞였어. 지금 작업에 필요한 context pack만 다시 골라줘."
    expected_primary_skill: memory-bank-harness
    expected_supporting_skills: [plan-spec-curator]
    should_not_trigger: [memory-bank-update, coordination-brief]
    expected_context: [active task, accepted memory, old plan summaries]
    expected_output_shape: "filtered task-specific context pack"
    quality_notes: "Old plans and raw transcript do not become active instructions."
    friction_risk: "context contamination"
  - case_id: runtime-018
    user_request: "이 플랜대로 구현해줘."
    expected_primary_skill: null
    expected_supporting_skills: [plan-short-term-docs, workflow-rigor]
    should_not_trigger: [plan-long-term-package, plan-spec-curator]
    expected_context: [active plan as input, target source files, validation command]
    expected_output_shape: "source/test/config/build diff plus validation; plan status update is optional bookkeeping"
    quality_notes: "Markdown-only docs/plan updates are incomplete unless documentation-only work was explicitly requested."
    friction_risk: "editing the plan instead of implementing the planned change"
  - case_id: runtime-019
    user_request: "/goal로 돌리기 전에 완료 조건, 검증 기준, 중단 조건 계약서만 만들어줘."
    expected_primary_skill: plan-loop-term
    expected_supporting_skills: []
    should_not_trigger: [workflow-plan-runner, workflow-validation, plan-long-term-package]
    expected_context: [goal_intent, success_conditions, verifier_evidence, stop_policy, retry_policy]
    expected_output_shape: "loop_term contract with success conditions, verifier/evidence map, progress/stall criteria, retry/stop policy, checkpoints, and handoff text"
    quality_notes: "Planning-stage contract only; no loop execution or implementation."
    friction_risk: "treating a completion contract as a long-term phase package"
  - case_id: runtime-020
    user_request: "이 마이그레이션을 phase별 서브플랜 패키지로 만들고 각 phase의 loop term도 포함해줘."
    expected_primary_skill: plan-long-term-package
    expected_supporting_skills: [plan-loop-term]
    should_not_trigger: [plan-short-term-docs, workflow-plan-runner]
    expected_context: [migration_scope, phase_package_intent, loop_term_subartifact]
    expected_output_shape: "phase planning package with loop term sections as nested contract artifacts"
    quality_notes: "Long-term package owns broad decomposition; plan-loop-term is a subartifact pattern."
    friction_risk: "letting the narrow loop-term skill replace package ownership"
  - case_id: runtime-021
    user_request: "이 주장에 대한 논문, 코드, 런타임 근거 중 어떤 evidence lane을 타야 할지 먼저 골라줘."
    expected_primary_skill: search-router
    expected_supporting_skills: []
    should_not_trigger: [research-router, report-qualitative, workflow-plan-runner]
    expected_context: [evidence_intent, domain_hints, claim_or_topic, final_task_owner]
    expected_output_shape: "selected evidence lane, owning skill, handoff note, and Unverified gaps"
    quality_notes: "Router selects the lane only; it does not synthesize, implement, or write a report."
    friction_risk: "turning lane selection into final research or qualitative reporting"
  - case_id: runtime-022
    user_request: "이 구현을 검토하고 개선점 알려줘."
    expected_primary_skill: null
    expected_supporting_skills: []
    should_not_trigger: [search-router]
    expected_context: [target_artifact_or_diff_if_provided]
    expected_output_shape: "ordinary review or task-specific response; no evidence-lane routing unless source/proof intent is added"
    quality_notes: "Bare review without explicit evidence/source/proof intent must not use search-router."
    friction_risk: "over-triggering evidence routing for generic review"
  - case_id: runtime-023
    user_request: "버튼 색만 바꾸는 작업인데 루프로 돌릴 필요가 있는지 판단해줘."
    expected_primary_skill: loop-readiness-router
    expected_supporting_skills: []
    should_not_trigger: [plan-loop-term, workflow-loop-runner, plan-long-term-package]
    expected_context: [prompt_draft, target_domain, verifier_hints]
    expected_output_shape: "loop_readiness classification as one_shot with decision_factors, minimum_sufficient_path, rationale, and direct next skill"
    quality_notes: "Explicit readiness request but simple deterministic tweak should not become a loop; cite anti-loop signals and final-check-only verification."
    friction_risk: "over-looping one-shot work"
  - case_id: runtime-024
    user_request: "이 Figma 화면을 맞을 때까지 구현하려고 해. 먼저 루프 준비 상태를 판정해줘."
    expected_primary_skill: loop-readiness-router
    expected_supporting_skills: [plan-loop-term, loop-verifier-registry]
    should_not_trigger: [workflow-loop-runner]
    expected_context: [prompt_draft, design_target, visual_verifier_need]
    expected_output_shape: "loop_readiness classification as loop_worthy with verifier_feedback_value, state/checkpoint need, contract and verifier-map next steps"
    quality_notes: "Design fidelity plus repeated screenshot/a11y evidence is loop-worthy, but execution waits for an accepted contract and verifier map."
    friction_risk: "starting execution before the contract exists"
  - case_id: runtime-025
    user_request: "이 loop_term의 SC-DESIGN 조건들을 어떤 verifier skill이 봐야 하는지 매핑해줘."
    expected_primary_skill: loop-verifier-registry
    expected_supporting_skills: []
    should_not_trigger: [workflow-loop-runner, design-frontend]
    expected_context: [loop_term, success_conditions, verifier_catalog]
    expected_output_shape: "verifier_map from success condition ids to verifier owners, independence, deterministic-first notes, pass/fail signals, evidence, fallbacks, and unavailable labels"
    quality_notes: "Verifier mapping does not run checks or implementation; maker/checker separation and evidence boundaries must be explicit."
    friction_risk: "mixing verifier mapping with execution"
  - case_id: runtime-026
    user_request: "승인된 loop_term과 verifier_map 기준으로 반복 실행해줘."
    expected_primary_skill: workflow-loop-runner
    expected_supporting_skills: [workflow-recovery, workflow-validation]
    should_not_trigger: [loop-readiness-router, plan-loop-term]
    expected_context: [accepted_loop_term, verifier_map, loop_budget, checkpoint_state]
    expected_output_shape: "observe-decide-act-verify-checkpoint iteration log, success-condition status, verifier evidence, retry classification, governance metrics, loop_stop_packet, checkpoint, and stop reason"
    quality_notes: "Execution requires an accepted loop contract; missing contract should block rather than invent terms, and repeated failures must change strategy or recover."
    friction_risk: "running a loop from a vague prompt"
  - case_id: runtime-027
    user_request: "이 루프는 배포 retry가 필요할 수도 있어. 비멱등 재시도, stop hook 평가, reward hacking 방지까지 계약에 넣어줘."
    expected_primary_skill: plan-loop-term
    expected_supporting_skills: [loop-verifier-registry]
    should_not_trigger: [workflow-loop-runner, knowledge-base-maintenance]
    expected_context: [loop_intent, governance_contract, side_effect_boundary, verifier_hints]
    expected_output_shape: "loop_term governance block with stop_hook_expectation, non_idempotent retry policy, anti_reward_hacking, safety/verifier/process/outcome metrics, and approval gates"
    quality_notes: "Runtime-sensitive governance belongs in the contract before execution; do not claim Stop-hook loop validation is agent-verified without current evidence."
    friction_risk: "executing non-idempotent retry or overstating hook/runtime support"
  - case_id: runtime-028
    user_request: "loop 실행 결과에서 Wiki Bank에 남길 개선 후보만 정리하고 accepted knowledge로는 올리지 마."
    expected_primary_skill: workflow-loop-runner
    expected_supporting_skills: [knowledge-base-maintenance]
    should_not_trigger: [knowledge-context-harness, memory-bank-ingestion]
    expected_context: [accepted_loop_term, loop_checkpoint, verifier_evidence, knowledge_feedback_candidates]
    expected_output_shape: "checkpoint with knowledge_feedback_candidates and explicit note that accepted Wiki Bank mutation requires knowledge-base-maintenance review"
    quality_notes: "Loop output can create feedback candidates, not accepted Wiki Bank knowledge. Knowledge maintenance is only a review/promotion handoff."
    friction_risk: "context compounding or poisoning from unreviewed loop observations"
  - case_id: runtime-029
    user_request: "이 SVG 차트를 만들었는데 빌드만 통과했어. 실제로 렌더해서 보이는지 확인하고 완료해줘."
    expected_primary_skill: design-visual-regression
    expected_supporting_skills: [workflow-validation]
    should_not_trigger: [analysis-codebase, research-router]
    expected_context: [artifact, renderer or command, observed output]
    expected_output_shape: "rendered observation evidence before completion, not build/syntax-only pass"
    quality_notes: "Well-formed is not correct; require one clean observed render, then stop."
    friction_risk: "claiming visual success from a build pass"
  - case_id: runtime-030
    user_request: "컨텍스트가 압축됐어. 이어서 작업하기 전에 현재 파일 상태부터 다시 확인해줘."
    expected_primary_skill: null
    expected_supporting_skills: [workflow-rigor]
    should_not_trigger: [memory-bank-update, analysis-codebase]
    expected_context: [current files, prior change scope]
    expected_output_shape: "re-confirm current file/tool state before acting; do not trust a stale summary"
    quality_notes: "Resume from observed current state, not assumed memory."
    friction_risk: "trusting a stale summary after compaction"
  - case_id: runtime-031
    user_request: "구현 끝났다고 하기 전에, 변경 동작을 실제로 검증한 증거를 같이 보여줘."
    expected_primary_skill: workflow-rigor
    expected_supporting_skills: []
    should_not_trigger: [report-diff, analysis-codebase]
    expected_context: [changed files, validation command and output]
    expected_output_shape: "completion only with observed verification evidence (command/exit/validator); claim-only is insufficient"
    quality_notes: "Observed evidence over claim text; a blocker closes only as accepted_risk with explicit approval."
    friction_risk: "claiming done without observed verification"
  - case_id: runtime-032
    user_request: "주석 오타 하나만 고쳐줘."
    expected_primary_skill: null
    expected_supporting_skills: []
    should_not_trigger: [workflow-rigor, workflow-loop-runner, plan-loop-term]
    expected_context: [target line]
    expected_output_shape: "direct minimal edit with no rigor gate or loop"
    quality_notes: "A quick harmless edit must not trigger the evidence gate or a loop (noise control)."
    friction_risk: "over-governing trivial work"
  - case_id: runtime-033
    user_request: "이 마이그레이션은 여러 턴에 걸쳐 진행되고 중간 발견사항을 잊으면 안 돼. 루프까진 아니야. 진행 상태를 추적해줘."
    expected_primary_skill: workflow-task-ledger
    expected_supporting_skills: [loop-readiness-router]
    should_not_trigger: [workflow-loop-runner, plan-loop-term, plan-long-term-package]
    expected_context: [objective, dependent steps, observed evidence, open findings]
    expected_output_shape: "resume-safe step/finding ledger with observed evidence_refs; completion blocked while open findings remain"
    quality_notes: "Checkpointed-task tier — not a LoopRun; evidence is observed refs, not free text."
    friction_risk: "escalating a non-convergent multi-turn task into a full LoopRun"
  - case_id: runtime-034
    user_request: "이 작업은 queue로 돌리지 말고 WorkItem lifecycle로 triage부터 closed까지 상태와 근거를 잡아줘."
    expected_primary_skill: workflow-task-ledger
    expected_supporting_skills: []
    should_not_trigger: [workflow-loop-runner, plan-loop-term, kanboard-plan-ops]
    expected_context: [source, owner, lifecycle_state, evidence_refs, findings, next_action]
    expected_output_shape: "WorkItem state artifact or lifecycle summary with runtime boundary flags kept false; TaskRun linkage only when an execution slice exists"
    quality_notes: "WorkItem is lifecycle governance, not a queue runtime, scheduler, Kanboard source of truth, or LoopRun replacement."
    friction_risk: "turning lifecycle state into unsupported automation"
  - case_id: runtime-035
    user_request: "one-shot보다는 크지만 short plan까지는 아니야. 다음 턴에도 finding과 evidence를 잃지 않게 ticket 상태만 잡고 진행해."
    expected_primary_skill: workflow-task-ledger
    expected_supporting_skills: []
    should_not_trigger: [plan-short-term-docs, plan-long-term-package, workflow-loop-runner]
    expected_context: [objective, dependent steps, evidence_refs, findings, next_action]
    expected_output_shape: "Task/Ticket checkpoint ledger with observed evidence_refs; no short-plan artifact unless explicitly requested"
    quality_notes: "TaskLedger is the task/ticket horizon state layer between one-shot and short plan."
    friction_risk: "escalating a task/ticket into a plan package or LoopRun"
  - case_id: runtime-036
    user_request: "short-term은 달력 기간이 아니라 지금 실행 가능한 4~8시간짜리 설계 horizon이야. 이 작업을 docs/plan으로 고정해줘."
    expected_primary_skill: plan-short-term-docs
    expected_supporting_skills: [workflow-validation]
    should_not_trigger: [plan-long-term-package, workflow-plan-runner, workflow-task-ledger]
    expected_context: [requirements, task_breakdown, validation_strategy, implementation_transition]
    expected_output_shape: "persisted tactical design plan for the current execution horizon"
    quality_notes: "Short plan owns a tactical plan artifact, not task/ticket state or execution."
    friction_risk: "confusing short-plan artifact creation with plan execution or task ledger state"
  - case_id: runtime-037
    user_request: "이 API 필드 추가하고 기존 패턴대로 테스트까지 맞춰서 구현해줘."
    expected_primary_skill: workflow-implementation
    expected_supporting_skills: [workflow-validation]
    should_not_trigger: [workflow-plan-runner, analysis-codebase, research-router]
    expected_context: [repo instructions, target source files, local patterns, validation command]
    expected_output_shape: "scoped implementation, changed artifacts, focused validation, user-verification gaps"
    quality_notes: "Direct coding work now has an implementation owner; it is not plan execution or repo-wide analysis."
    friction_risk: "leaving ordinary implementation as an unowned task-specific gap"
  - case_id: runtime-038
    user_request: "이 failing test 원인 확인해서 코드 고치고 원래 실패가 사라졌는지 검증해줘."
    expected_primary_skill: workflow-bug-fix
    expected_supporting_skills: [analysis-bug]
    should_not_trigger: [workflow-recovery, workflow-plan-runner, analysis-codebase]
    expected_context: [failure signal, expected behavior, implicated source and test, validation output]
    expected_output_shape: "failure signal, active diagnosis, targeted fix, original-signal verification, regression coverage note"
    quality_notes: "First fix pass is workflow-bug-fix; recovery is only after repeated same-signature failure."
    friction_risk: "routing concrete bug fixing to diagnosis-only RCA or repeated-failure recovery too early"
  - case_id: runtime-039
    user_request: "이 코드베이스에서 deep module 후보를 3개만 찾아서 다음에 뭘 고칠지 랭킹해줘."
    expected_primary_skill: analysis-architecture-deepening
    expected_supporting_skills: []
    should_not_trigger: [analysis-codebase, workflow-implementation, workflow-bug-fix]
    expected_context: [scoped source tree, representative call sites, tests, architecture friction signals]
    expected_output_shape: "scanned scope, friction signals, ranked deepening candidates, recommended next candidate"
    quality_notes: "Deepening candidate discovery is lighter than repo-wide codebase reporting and does not implement before selection."
