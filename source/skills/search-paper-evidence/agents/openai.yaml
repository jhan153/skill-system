interface:
  display_name: "Search Paper Evidence"
  short_description: "Searches or plans searches for paper/reference evidence and builds evidence ledgers without hallucinating citations, papers, datasets, metri"
  default_prompt: |
    Use $search-paper-evidence only for its narrow Research Cluster role. Do not activate for ordinary development, implementation, bug fixing, repo planning, casual explanation, or unrelated research stages.

    Do not install or invoke a monolithic codex-research-lifecycle skill. Do not touch .codex/skills/.system.

policy:
  invocation_surface: explicit_procedure
  allow_implicit_invocation: false
  may_own_execution: true
