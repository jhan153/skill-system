interface:
  display_name: "Research Peer Review"
  short_description: "Produces peer-review-style critique for manuscripts, proposals, or research plans with major/minor concerns, reproducibility, ethics/reporti"
  default_prompt: |
    Use $research-peer-review only for its narrow Research Cluster role. Do not activate for ordinary development, implementation, bug fixing, repo planning, casual explanation, or unrelated research stages.

    Do not install or invoke a monolithic codex-research-lifecycle skill. Do not touch .codex/skills/.system.

policy:
  invocation_surface: evidence_gate
  allow_implicit_invocation: false
  may_own_execution: false
  may_write: false
  may_block_completion: true
