interface:
  display_name: "Analysis Bug"
  short_description: "Repro-first RCA for recurring or unclear failures"
  default_prompt: "Use $analysis-bug to lock the repro, gather evidence, identify one primary root cause, compare fixes, and verify the result."

policy:
  invocation_surface: explicit_procedure
  allow_implicit_invocation: false
  may_own_execution: true
