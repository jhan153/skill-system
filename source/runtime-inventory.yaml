    class: shared-neutral
    generation: mirror-from-canonical
    confidence: confirmed
    gap: none
    notes: "already generated codex->claude by sync_generated_mirrors.py."

  # platform-variant root: one neutral body + per-platform overlay
  - path: "AGENTS.md (codex) | CLAUDE.md (claude)"
    present_in: [codex, claude]
    class: shared-neutral
    generation: platform-template
    confidence: confirmed
    gap: none
    notes: "same working-rules body; diverges only at feature-name level (settings.json/permission modes, .claude paths, /loop). Neutral body + codex/claude overlay produces AGENTS.md / CLAUDE.md."

