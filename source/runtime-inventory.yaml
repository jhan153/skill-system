# ---------------------------------------------------------------------------
# platform-variant tools (present in both but divergent, or shared deps)
# ---------------------------------------------------------------------------
  - path: "tools/notify_desktop.py"
    present_in: [codex, claude]
    class: platform-native
    generation: codex-native + claude-native
    confidence: confirmed
    gap: none
    phase_1b_decision: "platform-native (kept as separate codex/claude variants), NOT shared-neutral."
    decision_rationale: "Content inspection: the two variants legitimately diverge (Codex notification title/app default 'codex' vs Claude 'Claude approval requested'/'claude', and notify_linux has a different signature - codex takes an `app` param, claude does not). This is correct platform behavior, not accidental drift; a forced neutral body + overlay would be fragile. Each platform keeps its own variant under source/platform/<p>/tools/."

  - path: "tools/requirements.txt"
    present_in: [codex]
    class: codex-only
    generation: codex-native
    confidence: provisional
    gap: missing-in-claude
    phase_1b_decision: "codex-only for v1."
    decision_rationale: "No runtime-logic tools are being made shared-neutral in v1 except schemas/docs. Claude does not need a Python dependency file for schemas-only parity."

# ---------------------------------------------------------------------------
# GAP candidates: codex runtime logic missing from claude (Phase 1b decision)
# Default bucket is codex-only until policy approves neutralization, because
# making these shared-neutral materially changes what the Claude runtime is.
# ---------------------------------------------------------------------------
  - path: "tools/ loop engine: init_loop_run.py, activate_loop_run.py, resume_loop_run.py, deactivate_loop_run.py, evaluate_loop_run.py, loop_policy.py, emit_loop_feedback.py"
    present_in: [codex]
    class: codex-only
    generation: codex-native
    confidence: provisional
    gap: missing-in-claude
    phase_1b_decision: "codex-only for v1."
    decision_rationale: "Moving the loop engine would materially expand the Claude runtime. Keep Codex as the primary loop runtime until there is explicit Claude-side runtime demand and validation."

  - path: "tools/ knowledge engine: knowledge_policy.py, build_context_pack.py"
    present_in: [codex]
    class: codex-only
    generation: codex-native
    confidence: provisional
    gap: missing-in-claude
    phase_1b_decision: "codex-only for v1."
    decision_rationale: "Knowledge runtime tools are executable runtime logic. Do not silently grow the Claude runtime before there is a Claude-side usage contract."

  - path: "tools/task_ledger.py"
    present_in: [codex]
    class: codex-only
    generation: codex-native
    confidence: provisional
    gap: missing-in-claude
    phase_1b_decision: "codex-only for v1, grouped with init_agent_run.py as the task/run-state decision."
    decision_rationale: "Task/run-state tooling is executable runtime logic and should stay in the primary Codex runtime for the first cut."

  - path: "tools/init_agent_run.py"
    present_in: [codex]
    class: codex-only
    generation: codex-native
    confidence: provisional
    gap: missing-in-claude
    phase_1b_decision: "codex-only for v1, grouped with task_ledger.py as the task/run-state decision."
    decision_rationale: "Task/run-state tooling is executable runtime logic and should stay in the primary Codex runtime for the first cut."

  - path: "schemas/ (harness, knowledge, loop, orchestration, task, tools, workitem)"
    present_in: [codex, claude]
    class: shared-neutral
    generation: neutral-verbatim
    confidence: confirmed
    gap: closed
    phase_1b_decision: "shared-neutral for v1 — APPLIED. 24 schema definitions + neutral examples -> source/shared/schemas, generated to BOTH .codex and .claude."
    decision_rationale: "Schemas are platform-agnostic contracts. EXCEPTION: schemas/workitem/examples/work-item.example.yaml references codex-only tooling (.codex/tools/validate_work_item.py) and stays codex-only (source/platform/codex/schemas, merge-overlaid onto .codex only). So .codex/schemas=25, .claude/schemas=24 (no .codex path leak)."

  - path: "research-routing.md"
    present_in: [codex]
    class: codex-only
    generation: codex-native
    confidence: confirmed
    gap: none
    phase_1b_decision: "codex-only — CORRECTED from the recorded 'shared-neutral' after content inspection."
    decision_rationale: "research-routing.md references codex-specific assets that do NOT exist on the Claude side (skill 'codex-research-lifecycle' and '.codex/references/speech-enhancement-research/'), which also do not exist under .codex at all (pre-existing dangling refs). Generating it to .claude would create a broken doc pointing at non-existent assets. Unlike context-routing.md (truly neutral), this is codex-specific. Sharing it would require a content rewrite, which is out of Phase 1b scope."

  - path: "research/ (ledger.yaml, research-ledger.schema.json)"
    present_in: [codex]
    class: codex-only
    generation: codex-native
    confidence: provisional
    gap: missing-in-claude
    phase_1b_decision: "codex-only for v1."
    decision_rationale: "The research ledger is mutable runtime/project data, not just a neutral contract. Keep it with the primary Codex runtime until a Claude-side research ledger workflow is explicit."

  - path: "harness/README.md"
    present_in: [codex]
    class: codex-only
