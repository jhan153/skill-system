    decision_rationale: "Content is codex-specific: it documents '.codex/harness/agent-runs/' runtime output and '.codex/tools/tests/fixtures/agent-runs/'. The Claude side already has its own hooks/README.md (claude-native). Not a shared gap; nothing to add to Claude."

