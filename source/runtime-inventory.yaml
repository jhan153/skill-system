phase_scope:
  phase_1a_regression_baseline:
    description: "Every confirmed committed path in .codex AND .claude must regenerate byte-identical from source. No content change."
    includes:
      - "all shared-neutral (incl. mirror-from-canonical and platform-template) entries"
      - "all codex-only and claude-only entries as-is"
      - "all maintainer-only entries as-is"
    excludes:
      - "local-only/ignored"
  phase_1b_gap_remediation:
    status: "DONE (applied to live; .codex byte-identical, .claude gained schemas/ only)"
    description: "Close real Claude mirror gaps. After content inspection, the only genuine shared gap was schema definitions; the other candidates were correct platform divergence, not gaps."
    applied:
      - "schemas/ -> shared-neutral: 24 definitions+examples generated to .claude (codex-only work-item.example.yaml kept out -> .claude/schemas=24, .codex/schemas=25, no .codex path leak)"
    corrected_after_content_inspection:
      - "research-routing.md -> codex-only (NOT shared): references codex-only/dangling assets (codex-research-lifecycle skill, .codex/references/...) -> would create a broken Claude doc"
      - "tools/notify_desktop.py -> platform-native (NOT shared/drift): legitimate per-platform divergence incl. a notify_linux signature difference"
      - "harness/README.md -> codex-only (NOT shared): documents .codex/harness/ paths; Claude has its own hooks/README.md"
    decisions_recorded_codex_only_for_v1:
      - "loop engine tools, knowledge engine tools, task_ledger.py, init_agent_run.py, research/ ledger+schema, tools/requirements.txt, rules/default.rules"
    review_record: "Phase 1b claude diff = + .claude/schemas/ (24 files) only. Verified: .codex byte-identical (no regression), .claude/schemas has 0 .codex refs, verify_bundle core/knowledge/loop PASS. Post-cutover the gate (live==source) replaces a separate allowlist file; the reviewable diff is git-visible (+ .claude/schemas)."
