# source/runtime-inventory.yaml
#
# Phase 0 deliverable of docs/plan/2026-06-29-skill-system-plugin-neutral-source.md.
# Classifies the current .codex / .claude runtime payload into neutral-source buckets.
#
# This file is HAND-AUTHORED classification input for the generator. It is NOT a
# generated target and must not carry a do-not-edit/checksum header.
#
# Evidence basis (2026-06-29, from skill-system/ root):
#   - diff -qr .codex/skills .claude/skills        -> only .DS_Store differs
#   - diff -q  .codex/context-routing.md .claude/.. -> IDENTICAL
#   - diff -qr .codex/docs .claude/docs            -> only docs/source_registry.yaml differs
#   - diff -qr .codex/eval .claude/eval            -> only eval/eval-case.schema.json differs
#   - ls .codex (14 top-level) vs .claude (7 top-level)
#   - .codex/tools = 40 files + tests/; .claude/tools = 2 files
#   - .gitignore excludes /docs/ /.github/ /.kanboard-plan/ /.kanboard-plan.yml

meta:
  plan: docs/plan/2026-06-29-skill-system-plugin-neutral-source.md
  phase: "0"
  basis: "diff -qr / ls of .codex and .claude (2026-06-29); see runtime-payload-policy.md"
  buckets:
    shared-neutral: "single neutral source; generated to BOTH .codex and .claude (verbatim, via overlay, or mirror-from-canonical)"
    codex-only: "Codex-platform runtime; no Claude equivalent intended"
    claude-only: "Claude-platform runtime; no Codex equivalent intended"
    maintainer-only: "bundle self-maintenance / CI assets; not part of per-platform end-user runtime parity"
    plugin-packageable: "destined for Phase 2 plugin packages (none classified yet at Phase 0)"
    local-only/ignored: "gitignored; never in release payload"
  generation_strategies:
    neutral-verbatim: "copy neutral source to both targets unchanged"
    mirror-from-canonical: "generate Claude copy from Codex canonical with header + source_checksum (existing sync_generated_mirrors.py behavior)"
    platform-template: "neutral body + per-platform overlay produces divergent codex/claude output"
    codex-native: "lives only in the .codex target"
    claude-native: "lives only in the .claude target"
    tooling: "generator/CI machinery, not shipped per-platform runtime content"
    local-ignored: "not generated, not committed"
  confidence:
    confirmed: "backed by diff/ls evidence in this session"
    provisional: "bucket needs a content read or an explicit Phase 0 policy decision (see decision_needed / runtime-payload-policy.md)"

# ---------------------------------------------------------------------------
# shared-neutral: already mirrored -> neutral source seed + Phase 1a baseline
# ---------------------------------------------------------------------------
entries:
  - path: "skills/"
    present_in: [codex, claude]
    class: shared-neutral
    generation: neutral-verbatim
    confidence: confirmed
    gap: none
    notes: "58 SKILL.md; diff -qr shows only .DS_Store differs. Primary Phase 1a regression-baseline anchor."

  - path: "context-routing.md"
    present_in: [codex, claude]
    class: shared-neutral
    generation: neutral-verbatim
    confidence: confirmed
    gap: none
    notes: "byte-identical (diff -q)."

  - path: "docs/"
    present_in: [codex, claude]
    class: shared-neutral
    generation: neutral-verbatim
    confidence: confirmed
    gap: none
    notes: "17 docs; all identical except docs/source_registry.yaml (separate mirror entry)."

  - path: "docs/source_registry.yaml"
    present_in: [codex, claude]
    class: shared-neutral
    generation: mirror-from-canonical
    confidence: confirmed
    gap: none
    notes: "already generated codex->claude by sync_generated_mirrors.py (header + checksum)."

  - path: "eval/"
    present_in: [codex, claude]
    class: shared-neutral
    generation: neutral-verbatim
    confidence: confirmed
    gap: none
    notes: "all identical except eval/eval-case.schema.json (mirror entry) and eval/observed-runs/ (fixtures, see maintainer)."

  - path: "eval/eval-case.schema.json"
