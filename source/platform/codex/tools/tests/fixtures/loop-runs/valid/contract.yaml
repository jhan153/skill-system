schema_version: 1
contract_id: LC-20260623-010
activation: explicit
goal:
  statement: "Make the bounded verification loop fixture pass its primary verifier."
  success_conditions:
    - id: SC-001
      statement: "Primary command verifier exits zero."
      required: true
      verifier:
        type: command_exit
        command: "pytest tests/test_loop.py -q"
        expected_exit_code: 0
    - id: SC-002
      statement: "Release notes artifact exists."
      required: false
      verifier:
        type: artifact_exists
        path: "docs/release-notes.md"
control:
  max_iterations: 3
  max_wall_time_seconds: 3600
  no_progress_limit: 2
  same_failure_limit: 2
  max_stop_continuations: 3
termination:
  precedence:
    - unsafe
    - fatal
    - success
    - approval_required
    - stalled
    - budget_exhausted
    - continue
