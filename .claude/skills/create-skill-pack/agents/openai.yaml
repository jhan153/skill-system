interface:
  display_name: "Create Skill Pack"
  short_description: "Create, harden, migrate, deprecate, register, or package Skill System source skills"
  default_prompt: |
    Use $create-skill-pack only when the user explicitly asks to create, update, harden, migrate, deprecate, register, package, or add route smoke tests for a reusable Skill System source skill, runtime companion payload, or plugin package membership.

    Do not activate for `.codex/skills/.system`, live home runtime, plugin caches, ordinary execution of an existing skill, casual discussion about skills, ordinary code review, bug analysis, planning, memory updates, repo AGENTS.md-only rules, or one-turn formatting preferences.

policy:
  invocation_surface: explicit_procedure
  allow_implicit_invocation: false
  may_own_execution: true
