interface:
  display_name: "Research Manuscript Writing"
  short_description: "Writes or revises scientific manuscript sections from verified evidence and research artifacts without inventing citations, results, tables,"
  default_prompt: |
    Use $research-manuscript-writing only for its narrow Research Cluster role. Do not activate for ordinary development, implementation, bug fixing, repo planning, casual explanation, or unrelated research stages.

    Do not install or invoke a monolithic codex-research-lifecycle skill. Do not touch .codex/skills/.system.

policy:
  invocation_surface: explicit_procedure
  allow_implicit_invocation: false
  may_own_execution: true
