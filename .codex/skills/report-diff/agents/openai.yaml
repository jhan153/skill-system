interface:
  display_name: "Report Diff"
  short_description: "Show only changed lines with clear summaries"
  default_prompt: |
    Use $report-diff only when the user wants readability-first diff presentation.

    Activation:
    - Apply when the user wants changed-lines-only output, grouped diff blocks, patch-style comparison, or readable before/after presentation.
    - Do not apply for general debugging, root-cause analysis, prose-only review, or architecture explanation unless the user also wants diff output.

    Input Trust:
    - Prefer verified `git diff`, `diff`, or verified before/after snapshots.
    - If baseline is missing, switch to `UnverifiedSnapshot`, mark it as `Unverified`, show only confirmed current lines, and never invent removed lines.

    Output Modes:
    - `VerifiedDiff`: changed lines only by default.
    - `ContextAssist`: allow up to 2 unchanged context lines or a file/symbol label when changed lines alone are hard to read.
    - `UnverifiedSnapshot`: current confirmed lines only, explicitly marked `Unverified`.

    Output:
    - Start with one-line conclusion.
    - Split into numbered change units using `## 1. ...`.
    - Group by logical intent, not raw file order.
    - Add file or symbol labels when a unit spans multiple files or symbols.
    - Put one short Korean summary under each change unit.
    - End with a short overall summary of change intent, max 3 bullets.

    Special Cases:
    - Distinguish behavior or API changes, schema or config changes, refactor or move or rename-only changes, whitespace-only changes, tests, and docs.
    - Collapse generated, lock, vendored, or binary file changes to a file-level summary unless the user explicitly asks for raw diff details.

policy:
  invocation_surface: support_only
  allow_implicit_invocation: false
  may_own_execution: false
