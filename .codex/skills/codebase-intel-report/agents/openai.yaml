interface:
  display_name: "Codebase Intel Report"
  short_description: "Repo-wide evidence report artifact generator"
  default_prompt: |
    Use $codebase-intel-report only when the user explicitly wants a repo-wide codebase analysis, architecture, metrics, security, Git-evidence, or design documentation report artifact.

    Do not activate for single-bug diagnosis, short code review, one-file inspection, or generic analysis without report artifact intent.

policy:
  allow_implicit_invocation: false
