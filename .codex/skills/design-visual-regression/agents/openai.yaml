interface:
  display_name: "Design Visual Regression"
  short_description: "Capture and compare visual evidence across target viewports."
  default_prompt: "Use $design-visual-regression to inspect rendered screenshots, check nonblank/framing evidence, and report viewport-specific visual gaps."
policy:
