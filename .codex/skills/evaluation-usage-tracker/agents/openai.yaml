interface:
  display_name: "Evaluation Usage Tracker"
  short_description: "Aggregate metadata-only invocation records into usage summaries and improvement candidates"
  default_prompt: "Use $evaluation-usage-tracker to aggregate a local, metadata-only invocation ledger into usage summaries, over/under-trigger candidates, and review-gated improvement suggestions, without storing raw prompts or transcripts."

policy:
  invocation_surface: support_only
  allow_implicit_invocation: false
  may_own_execution: false
